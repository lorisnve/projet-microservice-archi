name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '22'

jobs:
  # ────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis
  # ────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed for CodeQL SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      # ---- SAST with CodeQL ----
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'

  # ────────────────────────────────────────────────
  # JOB 2 — Tests (unit + integration)
  # ────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: library_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      # Override .env.test with CI-specific PostgreSQL credentials
      - name: Configure .env.test for CI
        run: |
          cat > .env.test << 'EOF'
          PORT=3001
          DB_HOST=localhost
          DB_PORT=5432
          DB_USER=postgres
          DB_PASS=postgres
          DB_NAME=library_test_db
          DB_DIALECT=postgres
          JWT_SECRET=test_jwt_secret_for_ci_only
          ADMIN_EMAIL=admin@test.com
          ADMIN_PASSWORD=AdminTest123!
          EOF

      - name: Run integration tests
        run: npm run test:integration

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
          retention-days: 7

  # ────────────────────────────────────────────────
  # JOB 3 — Build Docker image & Vulnerability scan
  # ────────────────────────────────────────────────
  build:
    name: Build & Scan Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write   # needed for Trivy SARIF upload

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # report findings but do not fail the pipeline

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      - name: Export image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ────────────────────────────────────────────────
  # JOB 4 — Push image to GitHub Container Registry
  #         (only on push events, not on PRs)
  # ────────────────────────────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=library-service
            org.opencontainers.image.description=Microservice de gestion de bibliothèque numérique
            org.opencontainers.image.licenses=ISC

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────
  # JOB 5 — Deploy to Kubernetes (staging)
  #         Uses kind (Kubernetes IN Docker) for ephemeral cluster
  # ────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: staging

      - name: Load Docker image into kind
        run: |
          docker load -i /tmp/image.tar
          kind load docker-image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest --name staging

      - name: Patch deployment for kind (use local image)
        run: |
          sed -i 's/imagePullPolicy: Always/imagePullPolicy: IfNotPresent/' k8s/deployment.yaml

      - name: Apply Kubernetes namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/ -n library-system

      - name: Wait for PostgreSQL to be ready
        run: kubectl rollout status deployment/postgres -n library-system --timeout=120s

      - name: Wait for library-service rollout
        run: kubectl rollout status deployment/library-service -n library-system --timeout=120s

      - name: Verify pods are running
        run: |
          echo "=== Pods ==="
          kubectl get pods -n library-system
          echo "=== Services ==="
          kubectl get svc -n library-system

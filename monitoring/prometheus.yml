global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'library-service'

rule_files:
  - 'alert-rules.yml'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Library microservice
  - job_name: 'library-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['library-service:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Node exporter (optional, if deployed)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
